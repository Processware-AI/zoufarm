<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" fill="none">
  <!-- Background blob -->
  <path d="M250 30C350 30 450 100 480 220C510 340 450 480 350 540C250 600 150 550 80 450C10 350 30 200 100 100C170 30 200 30 250 30Z" fill="url(#bgGrad)" opacity="0.85"/>

  <!-- Consultant figure (centered, simplified) -->
  <g transform="translate(250, 150)">
    <!-- Head -->
    <circle cx="0" cy="30" r="28" fill="#d4a574"/>
    <path d="M-22,20 C-22,2 -12,-6 0,-8 C12,-6 22,2 22,20 C22,12 12,6 0,8 C-12,6 -22,12 -22,20Z" fill="#2c2c2c"/>
    <circle cx="-9" cy="28" r="7" stroke="#333" stroke-width="1.5" fill="none"/>
    <circle cx="9" cy="28" r="7" stroke="#333" stroke-width="1.5" fill="none"/>
    <line x1="-2" y1="28" x2="2" y2="28" stroke="#333" stroke-width="1.5"/>
    <circle cx="-9" cy="29" r="2" fill="#333"/>
    <circle cx="9" cy="29" r="2" fill="#333"/>
    <path d="M-5,38 Q0,44 5,38" stroke="#333" stroke-width="1.5" fill="none"/>

    <!-- Body -->
    <path d="M-26,100 C-26,70 -18,55 0,50 C18,55 26,70 26,100 L26,170 L-26,170 Z" fill="#1a2a4a"/>
    <rect x="-5" y="62" width="10" height="50" fill="#4fc3f7"/>
    <polygon points="0,62 -5,70 5,70" fill="#3d8ecf"/>
    <path d="M-5,62 L-22,88 L-18,92 L-5,76" fill="#243656"/>
    <path d="M5,62 L22,88 L18,92 L5,76" fill="#243656"/>

    <!-- Arms -->
    <path d="M-26,100 C-40,110 -60,105 -70,90" stroke="#1a2a4a" stroke-width="14" stroke-linecap="round" fill="none"/>
    <circle cx="-70" cy="88" r="7" fill="#d4a574"/>
    <path d="M26,100 C40,120 42,150 35,180" stroke="#1a2a4a" stroke-width="14" stroke-linecap="round" fill="none"/>
    <circle cx="35" cy="182" r="7" fill="#d4a574"/>

    <!-- Legs -->
    <rect x="-16" y="170" width="14" height="80" rx="4" fill="#2c3e6b"/>
    <rect x="2" y="170" width="14" height="80" rx="4" fill="#2c3e6b"/>
    <ellipse cx="-9" cy="254" rx="12" ry="7" fill="#1a1a2e"/>
    <ellipse cx="9" cy="254" rx="12" ry="7" fill="#1a1a2e"/>
  </g>

  <!-- Floating display -->
  <g transform="translate(100, 220)" opacity="0.8">
    <rect x="0" y="0" width="100" height="65" rx="8" fill="rgba(10,22,40,0.8)"/>
    <circle cx="25" cy="25" r="10" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
    <circle cx="25" cy="25" r="4" fill="#4fc3f7" opacity="0.5"/>
    <rect x="45" y="20" width="45" height="4" rx="2" fill="#4fc3f7" opacity="0.5"/>
    <rect x="45" y="30" width="35" height="4" rx="2" fill="#4fc3f7" opacity="0.3"/>
    <rect x="10" y="46" width="80" height="6" rx="3" fill="rgba(79,195,247,0.2)"/>
    <rect x="10" y="46" width="55" height="6" rx="3" fill="#4fc3f7" opacity="0.5"/>
  </g>

  <!-- Data nodes -->
  <circle cx="130" cy="180" r="8" fill="#4fc3f7" opacity="0.4"/>
  <circle cx="130" cy="180" r="4" fill="#4fc3f7"/>
  <circle cx="370" cy="200" r="6" fill="#66BB6A" opacity="0.4"/>
  <circle cx="370" cy="200" r="3" fill="#66BB6A"/>

  <!-- Checkmark -->
  <g transform="translate(150, 340)" opacity="0.7">
    <circle cx="0" cy="0" r="16" fill="#66BB6A"/>
    <polyline points="-6,0 -2,5 8,-5" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="50%" stop-color="#2c4a7c"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>
</svg>
