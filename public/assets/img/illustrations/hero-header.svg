<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" fill="none">
  <!-- Background blob shape -->
  <path d="M550 50C750 50 950 150 1050 350C1150 550 1050 750 900 850C750 950 550 900 400 800C250 700 100 550 150 350C200 150 350 50 550 50Z" fill="url(#bgGrad)" opacity="0.9"/>

  <!-- City skyline silhouette -->
  <rect x="580" y="320" width="60" height="200" rx="4" fill="#2a3a5c" opacity="0.3"/>
  <rect x="660" y="280" width="50" height="240" rx="4" fill="#2a3a5c" opacity="0.25"/>
  <rect x="730" y="350" width="45" height="170" rx="4" fill="#2a3a5c" opacity="0.2"/>
  <rect x="790" y="300" width="55" height="220" rx="4" fill="#2a3a5c" opacity="0.25"/>
  <rect x="860" y="340" width="40" height="180" rx="4" fill="#2a3a5c" opacity="0.2"/>
  <rect x="620" y="360" width="30" height="160" rx="4" fill="#2a3a5c" opacity="0.15"/>

  <!-- Floor/ground -->
  <ellipse cx="720" cy="720" rx="280" ry="30" fill="#1a2a4a" opacity="0.15"/>

  <!-- Desk -->
  <rect x="560" y="580" width="320" height="12" rx="6" fill="#3d5a80"/>
  <rect x="580" y="592" width="12" height="100" rx="3" fill="#3d5a80"/>
  <rect x="856" y="592" width="12" height="100" rx="3" fill="#3d5a80"/>

  <!-- Laptop on desk -->
  <g transform="translate(650, 520)">
    <!-- Laptop screen -->
    <rect x="0" y="0" width="120" height="80" rx="6" fill="#2c3e6b"/>
    <rect x="6" y="6" width="108" height="62" rx="3" fill="#4fc3f7"/>
    <!-- Screen content - chart -->
    <polyline points="16,55 36,45 56,50 76,30 96,25 104,28" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <polyline points="16,58 36,52 56,55 76,42 96,38 104,40" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Bars -->
    <rect x="20" y="48" width="8" height="15" rx="1" fill="rgba(255,255,255,0.3)"/>
    <rect x="36" y="42" width="8" height="21" rx="1" fill="rgba(255,255,255,0.3)"/>
    <rect x="52" y="45" width="8" height="18" rx="1" fill="rgba(255,255,255,0.3)"/>
    <rect x="68" y="35" width="8" height="28" rx="1" fill="rgba(255,255,255,0.3)"/>
    <rect x="84" y="30" width="8" height="33" rx="1" fill="rgba(255,255,255,0.3)"/>
    <!-- Laptop base -->
    <path d="M-10,80 L130,80 L120,90 L10,90 Z" fill="#3d5a80"/>
  </g>

  <!-- Coffee cup -->
  <g transform="translate(610, 555)">
    <rect x="0" y="8" width="22" height="22" rx="3" fill="#e8e8e8"/>
    <path d="M22,14 C28,14 28,24 22,24" stroke="#e8e8e8" stroke-width="3" fill="none"/>
    <rect x="3" y="11" width="16" height="4" rx="2" fill="#8B6914"/>
    <!-- Steam -->
    <path d="M8,6 Q10,0 8,-4" stroke="#ccc" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M14,5 Q16,-1 14,-5" stroke="#ccc" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Main consultant figure -->
  <g transform="translate(700, 250)">
    <!-- Body - suit jacket -->
    <path d="M-30,120 C-30,80 -20,60 0,55 C20,60 30,80 30,120 L30,200 L-30,200 Z" fill="#1a2a4a"/>
    <!-- Shirt/tie -->
    <rect x="-6" y="70" width="12" height="60" fill="#4fc3f7"/>
    <polygon points="0,70 -6,80 6,80" fill="#3d8ecf"/>
    <!-- Suit lapels -->
    <path d="M-6,70 L-25,100 L-20,105 L-6,85" fill="#243656"/>
    <path d="M6,70 L25,100 L20,105 L6,85" fill="#243656"/>

    <!-- Head -->
    <circle cx="0" cy="35" r="30" fill="#d4a574"/>
    <!-- Hair -->
    <path d="M-25,25 C-25,5 -15,-5 0,-8 C15,-5 25,5 25,25 C25,15 15,8 0,10 C-15,8 -25,15 -25,25Z" fill="#2c2c2c"/>
    <!-- Glasses -->
    <circle cx="-10" cy="33" r="8" stroke="#333" stroke-width="2" fill="none"/>
    <circle cx="10" cy="33" r="8" stroke="#333" stroke-width="2" fill="none"/>
    <line x1="-2" y1="33" x2="2" y2="33" stroke="#333" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="-10" cy="34" r="2" fill="#333"/>
    <circle cx="10" cy="34" r="2" fill="#333"/>
    <!-- Smile -->
    <path d="M-6,43 Q0,50 6,43" stroke="#333" stroke-width="1.5" fill="none"/>

    <!-- Left arm - pointing at holographic display -->
    <path d="M-30,120 C-50,130 -80,120 -100,100" stroke="#1a2a4a" stroke-width="16" stroke-linecap="round" fill="none"/>
    <circle cx="-100" cy="98" r="8" fill="#d4a574"/>
    <!-- Pointing finger -->
    <line x1="-100" y1="98" x2="-115" y2="88" stroke="#d4a574" stroke-width="5" stroke-linecap="round"/>

    <!-- Right arm - on desk -->
    <path d="M30,120 C45,150 50,200 40,250" stroke="#1a2a4a" stroke-width="16" stroke-linecap="round" fill="none"/>
    <circle cx="40" cy="252" r="8" fill="#d4a574"/>

    <!-- Legs -->
    <rect x="-20" y="200" width="16" height="100" rx="5" fill="#2c3e6b"/>
    <rect x="4" y="200" width="16" height="100" rx="5" fill="#2c3e6b"/>
    <!-- Shoes -->
    <ellipse cx="-12" cy="305" rx="14" ry="8" fill="#1a1a2e"/>
    <ellipse cx="12" cy="305" rx="14" ry="8" fill="#1a1a2e"/>
  </g>

  <!-- Holographic floating display (left side) -->
  <g transform="translate(520, 300)" opacity="0.85">
    <rect x="0" y="0" width="160" height="100" rx="10" fill="url(#holoGrad)" opacity="0.7"/>
    <rect x="8" y="8" width="144" height="84" rx="6" stroke="rgba(79,195,247,0.5)" stroke-width="1" fill="none"/>
    <!-- Gear icon -->
    <circle cx="40" cy="40" r="15" stroke="#4fc3f7" stroke-width="2" fill="none"/>
    <circle cx="40" cy="40" r="6" fill="#4fc3f7" opacity="0.5"/>
    <g stroke="#4fc3f7" stroke-width="3" stroke-linecap="round">
      <line x1="40" y1="22" x2="40" y2="18"/>
      <line x1="40" y1="62" x2="40" y2="58"/>
      <line x1="22" y1="40" x2="18" y2="40"/>
      <line x1="62" y1="40" x2="58" y2="40"/>
    </g>
    <!-- Text lines -->
    <rect x="70" y="30" width="70" height="5" rx="2" fill="#4fc3f7" opacity="0.6"/>
    <rect x="70" y="42" width="55" height="5" rx="2" fill="#4fc3f7" opacity="0.4"/>
    <rect x="70" y="54" width="60" height="5" rx="2" fill="#4fc3f7" opacity="0.3"/>
    <!-- Progress bar -->
    <rect x="15" y="72" width="130" height="8" rx="4" fill="rgba(79,195,247,0.2)"/>
    <rect x="15" y="72" width="95" height="8" rx="4" fill="#4fc3f7" opacity="0.6"/>
    <!-- Glow effect -->
    <circle cx="80" cy="50" r="60" fill="url(#glowGrad)" opacity="0.15"/>
  </g>

  <!-- Floating data nodes -->
  <g opacity="0.6">
    <!-- Node 1 -->
    <circle cx="480" cy="250" r="12" fill="#4fc3f7" opacity="0.4"/>
    <circle cx="480" cy="250" r="6" fill="#4fc3f7"/>
    <!-- Node 2 -->
    <circle cx="520" cy="200" r="10" fill="#66BB6A" opacity="0.4"/>
    <circle cx="520" cy="200" r="5" fill="#66BB6A"/>
    <!-- Node 3 -->
    <circle cx="900" cy="220" r="10" fill="#FFA024" opacity="0.4"/>
    <circle cx="900" cy="220" r="5" fill="#FFA024"/>
    <!-- Node 4 -->
    <circle cx="950" cy="300" r="8" fill="#4fc3f7" opacity="0.4"/>
    <circle cx="950" cy="300" r="4" fill="#4fc3f7"/>
    <!-- Connecting lines -->
    <line x1="486" y1="244" x2="515" y2="205" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
    <line x1="530" y1="200" x2="560" y2="310" stroke="#66BB6A" stroke-width="1" opacity="0.2"/>
    <line x1="905" y1="225" x2="945" y2="296" stroke="#FFA024" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Floating charts/widgets -->
  <!-- Small pie chart -->
  <g transform="translate(880, 400)" opacity="0.7">
    <circle cx="0" cy="0" r="30" fill="rgba(26,42,74,0.5)"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#4fc3f7" stroke-width="8" stroke-dasharray="50 88" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#66BB6A" stroke-width="8" stroke-dasharray="25 113" stroke-dashoffset="-50" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#FFA024" stroke-width="8" stroke-dasharray="13 125" stroke-dashoffset="-75" transform="rotate(-90)"/>
  </g>

  <!-- Checkmark badge -->
  <g transform="translate(500, 450)" opacity="0.75">
    <circle cx="0" cy="0" r="22" fill="#66BB6A"/>
    <polyline points="-8,0 -3,6 10,-6" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Decorative dots pattern -->
  <g fill="#4fc3f7" opacity="0.15">
    <circle cx="950" cy="500" r="3"/>
    <circle cx="970" cy="500" r="3"/>
    <circle cx="990" cy="500" r="3"/>
    <circle cx="950" cy="520" r="3"/>
    <circle cx="970" cy="520" r="3"/>
    <circle cx="990" cy="520" r="3"/>
    <circle cx="950" cy="540" r="3"/>
    <circle cx="970" cy="540" r="3"/>
    <circle cx="990" cy="540" r="3"/>
  </g>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="50%" stop-color="#2c4a7c"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="holoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a3050" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="glowGrad">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
